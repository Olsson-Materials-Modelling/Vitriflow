# Optional, validation-only CP2K workflow.  The 64-atom Si cell and minimal
# SZV basis are large enough to exercise realistic I/O while keeping this a
# plumbing test rather than a converged electronic-structure calculation.
engine: cp2k

cp2k:
  # CP2K lives in a separate `vitriflow-cp2k` conda env (it cannot co-install
  # with the LAMMPS/KIM vitriflow env). exec_prefix runs the bare
  # `mpirun`/`cp2k.psmp` inside that env so the MPI build and CP2K binary stay
  # consistent.
  exec_prefix: ["conda", "run", "-n", "vitriflow-cp2k", "--no-capture-output"]
  mpi_cmd: mpirun
  nprocs: 4
  cp2k_cmd: cp2k.psmp
  basis_set_file_name: BASIS_MOLOPT
  potential_file_name: GTH_POTENTIALS
  xc_functional: PBE
  cutoff_Ry: 250.0
  rel_cutoff_Ry: 40.0
  ngrids: 4
  eps_scf: 1.0e-4
  max_scf: 10
  scf_guess: ATOMIC
  use_ot: true
  ot_minimizer: DIIS
  ot_preconditioner: FULL_SINGLE_INVERSE
  ramp_max_deltaT_K: 10000.0
  ramp_max_segments: 1
  timeout_sec: 900.0
  kind_settings:
    Si:
      basis_set: SZV-MOLOPT-SR-GTH
      potential: GTH-PBE-q4

structure:
  generate:
    method: builtin
    builtin_name: si_diamond
    formula: Si
    n_formula_units: 64

md:
  timestep: 0.5
  atom_style: atomic
  ensemble: npt
  temperature: 300.0
  pressure: 1.0
  thermo_every: 1
  dump_every: 1
  stage_continuity: continuous
  thermostat:
    style: csvr
    # Established Vitriflow CP2K default used by the release example: 50 fs.
    tdamp: 50.0
  barostat:
    # Established Vitriflow CP2K default used by the release example: 5000 fs.
    pdamp: 5000.0
    mode: iso

random_seed: 431004

autotune:
  preflight:
    enabled: true
    ensembles: [npt]
    allow_nvt_fallback: false
    allow_implicit_dt_fallback: false
    dt_candidates: [0.5]
    tdamp_factors: [100.0]
    pdamp_factors: [10000.0]
    min_pdamp_ps_highT: 5.0
    T_low: 300.0
    T_high: 2500.0
    equil_steps: 2
    run_steps: 5
    tail_window: 3
    temp_rel_tol: 1.0
    press_abs_tol: 1000000000.0
    max_temp_factor: 10.0
    max_press_abs: 1.0e12
    max_vol_ratio: 10.0
    confirm_equil_steps: 0
    confirm_run_steps: 5
    confirm_topk: 1
    confirm_temps: [500.0, 2500.0]
    timeout_sec: 900.0

  tm_scan:
    t_min: 500.0
    t_max: 2500.0
    dT: 500.0
    ensemble: npt
    equil_steps: 2
    sample_steps: 10
    msd_every: 1
    replicates_per_temp: 3
    sample_in_nvt: true
    highT_mode: onset
    gr:
      enabled: true
      nbins: 100
      r_max: 5.0
      frames: 6
      stride: 1
      smooth: 5
      pair: [Si, Si]

  highT:
    margin: 200.0
    replicates: 3
    chunk_steps: 10
    max_chunks: 1
    min_total_steps: 10
    rms_multiple: 0.1
    stationarity_tol: 1.0
    enforce_stationarity: false

  quench:
    t_final: 300.0
    relax_steps: 10
    enforce_rate_bounds: false
    rates_K_per_ps: [5000000.0, 2500000.0, 1250000.0]
    replicates_per_rate: 3

  metrics:
    enabled: true
    type_to_species: [Si]
    # Exercise time-averaging with a strict majority of the ten stored
    # relaxation frames.
    time_average_frames: 6
    time_average_stride: 1
    collect_during_production_stages: true
    stage_timeseries_frame_stride: 1
    stage_timeseries_max_frames: 12
    stage_timeseries_make_plot: true
    quench_tail_min_frames: 3
    quench_tail_focus_fraction: 0.8
    quench_tail_fallback_fraction: 0.4
    elastic:
      enabled: false
    pairs:
      - pair: [Si, Si]
        cutoff: 3.0
    coordinations:
      - central: Si
        neighbor: Si
        cutoff: 3.0
        expected: 4
        defect_frac_tol: 1.0
    coordination_sweep:
      enabled: true
      dr: 0.02
      n_below: 2
      n_above: 2
      strained_delta: 0.1
    angles:
      - triplet: [Si, Si, Si]
    rings:
      enabled: true
      mode: bond_graph
      algorithm: cycle_basis
      nodes: [Si]
      bond_pairs:
        - pair: [Si, Si]
          cutoff: 3.0
      max_cycle_size: 8
      max_paths_per_edge: 4
    gr:
      - {pair: null, r_max: 5.0, nbins: 100}
      - {pair: [Si, Si], r_max: 5.0, nbins: 100}
    sq:
      - {pair: null, q_max: 16.0, nq: 120, r_max: 5.0, nbins: 160}
      - {pair: [Si, Si], q_max: 16.0, nq: 120, r_max: 5.0, nbins: 160}
    voids:
      enabled: true
      n_samples: 256
      n_samples_timeseries: 32
      sampler: sobol
      seed: 0
      k_nearest: 12
      default_radius: 0.0
      r_max: 4.0
      cdf_points: 64
      probe_radii: [0.5, 1.0, 1.5]
    amorphous:
      enabled: true
      enforce_during_rate_scan: false
      enforce_during_production: false
      q_max: 16.0
      nq: 64
      r_max: 5.0
      nbins: 100
      peak_search: [0.5, 8.0]
      reference:
        enabled: false

  production:
    enabled: true
    min_boxes: 6
    batch_boxes: 4
    max_boxes: 10
    warmup_start_temperature: 300.0
    warmup_duration_ps: 0.0005
    dump_trajectory: true
    dump_every_steps: 1
    check_convergence: true
    consecutive_converged_checks: 2
    bondlen_cdf_points: 64
    angle_cdf_points: 72
    store_distributions: true
    embed_structures: true
    exclude_coordination_defects: false

  convergence:
    mode: both
    density_rel_tol: 1000000000.0
    density_abs_tol: 1000000000.0
    coord_rel_tol: 1000000000.0
    coord_abs_tol: 1000000000.0
    bondlen_rel_tol: 1000000000.0
    bondlen_abs_tol: 1000000000.0
    angle_rel_tol: 1000000000.0
    angle_abs_tol: 1000000000.0
    ring_rel_tol: 1000000000.0
    ring_abs_tol: 1000000000.0
    ring_size_rel_tol: 1000000000.0
    ring_size_abs_tol: 1000000000.0
    gr_peak_r_rel_tol: 1000000000.0
    gr_peak_r_abs_tol: 1000000000.0
    gr_peak_height_rel_tol: 1000000000.0
    gr_peak_height_abs_tol: 1000000000.0
    gr_peak_fwhm_rel_tol: 1000000000.0
    gr_peak_fwhm_abs_tol: 1000000000.0
    bondlen_cdf_rel_tol: 1000000000.0
    bondlen_cdf_abs_tol: 1000000000.0
    angle_cdf_rel_tol: 1000000000.0
    angle_cdf_abs_tol: 1000000000.0
    coord_cdf_rel_tol: 1000000000.0
    coord_cdf_abs_tol: 1000000000.0
    gr_curve_rel_tol: 1000000000.0
    gr_curve_abs_tol: 1000000000.0
    sq_curve_rel_tol: 1000000000.0
    sq_curve_abs_tol: 1000000000.0
    void_cdf_rel_tol: 1000000000.0
    void_cdf_abs_tol: 1000000000.0
    bounded_ci_method: t
    familywise: bonferroni
    stability_split: half
    stability_distance: wasserstein
    stability_bootstrap: 16
    stability_quantile: 0.95
