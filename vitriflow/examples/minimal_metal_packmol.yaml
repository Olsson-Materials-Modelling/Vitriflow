# Random-packed aluminium melt-quench example.
kim:
  model: EAM_Dynamo_ErcolessiAdams_1994_Al__MO_123629422045_005
  interactions:
  - Al
  user_units: metal
md:
  timestep: 0.001
  atom_style: atomic
  ensemble: npt
  temperature: 300.0
  pressure: 0.0
  thermo_every: 100
  dump_every: 1000
  stage_continuity: continuous
  neighbor_skin: 2.5
  neighbor_skin_autotune: true
  neighbor_skin_step: 0.5
  neighbor_skin_max: 5.0
  thermostat:
    style: nose-hoover
    tdamp: 0.1
  barostat:
    pdamp: 1.0
    mode: iso
structure:
  generate:
    method: random
    formula: Al
    n_formula_units: 256
    packing_density_g_cm3: 2.7
    random_min_distance: 2.0
    seed: 1234
autotune:
  preflight:
    enabled: true
  tm_scan:
    t_min: 800.0
    t_max: 1400.0
    dT: 200.0
    equil_steps: 5000
    sample_steps: 20000
    msd_every: 100
    replicates_per_temp: 20
  highT:
    margin: 200.0
    replicates: 20
    chunk_steps: 50000
    min_total_steps: 100000
    rms_multiple: 3.0
    stationarity_tol: 0.03
  quench:
    t_final: 300.0
    relax_steps: 60000
    rates_K_per_ps:
    - 100.0
    - 50.0
    - 25.0
    - 10.0
    - 1.0
    replicates_per_rate: 20
  size:
    enabled: false
  metrics:
    enabled: true
    time_average_frames: 8
    time_average_stride: 250
    collect_during_production_stages: true
    stage_timeseries_frame_stride: 1
    stage_timeseries_max_frames: 128
    stage_timeseries_make_plot: true
    quench_tail_min_frames: 48
    quench_tail_focus_fraction: 0.8
    quench_tail_fallback_fraction: 0.4
    elastic:
      enabled: true
      run_on_relax: true
      run_on_highT_when_force_isotropic: true
      strict_when_force_isotropic: true
      collect_during_production_stages: true
      stage_timeseries_frame_stride: 1
      stage_timeseries_max_frames: 24
      stage_timeseries_make_plot: true
      quench_tail_min_frames: 24
      quench_tail_focus_fraction: 0.8
      quench_tail_fallback_fraction: 0.4
      diffusion_freeze_threshold_A2_per_ps: 0.1
      born_delta: 1.0e-05
      make_plot: true
      isotropy_warn_threshold: 0.15
      coupling_warn_threshold: 0.1
      hotspot_warn_multiple_of_median: 5.0
    pairs:
    - pair:
      - Al
      - Al
    coordinations:
    - central: Al
      neighbor: Al
      expected: 12
      defect_frac_tol: 0.25
    coordination_sweep:
      enabled: true
      dr: 0.02
      n_below: 0
      n_above: 10
      strained_delta: 0.1
    angles:
    - triplet:
      - Al
      - Al
      - Al
    rings:
      enabled: true
      mode: bond_graph
      algorithm: cycle_basis
      nodes:
      - Al
      bond_pairs:
      - pair:
        - Al
        - Al
      max_cycle_size: 8
      max_paths_per_edge: 4
    gr:
    - pair: null
      r_max: 10.0
      nbins: 500
    - pair:
      - Al
      - Al
      r_max: 10.0
      nbins: 500
    sq:
    - pair: null
      q_max: 20.0
      nq: 400
      r_max: 10.0
      nbins: 800
    - pair:
      - Al
      - Al
      q_max: 20.0
      nq: 400
      r_max: 10.0
      nbins: 800
    voids:
      enabled: true
      n_samples: 8192
      n_samples_timeseries: 2048
      sampler: sobol
      seed: 0
      k_nearest: 16
      default_radius: 0.0
      r_max: 4.0
      cdf_points: 200
      probe_radii:
      - 0.5
      - 1.0
      - 1.5
  production:
    enabled: true
    min_boxes: 20
    max_boxes: 20
    batch_boxes: 20
    dump_trajectory: true
    dump_every_steps: 1000
    check_convergence: true
    consecutive_converged_checks: 1
    bondlen_cdf_points: 200
    angle_cdf_points: 180
    store_distributions: true
    exclude_coordination_defects: false
  convergence:
    mode: both
    density_rel_tol: 0.01
    density_abs_tol: 0.001
    coord_rel_tol: 0.0
    coord_abs_tol: 0.1
    bondlen_rel_tol: 0.0
    bondlen_abs_tol: 0.03
    angle_rel_tol: 0.0
    angle_abs_tol: 3.0
    ring_rel_tol: 0.0
    ring_abs_tol: 0.1
    ring_size_rel_tol: 0.0
    ring_size_abs_tol: 0.5
    gr_peak_r_rel_tol: 0.0
    gr_peak_r_abs_tol: 0.03
    gr_peak_height_rel_tol: 0.05
    gr_peak_height_abs_tol: 0.2
    gr_peak_fwhm_rel_tol: 0.05
    gr_peak_fwhm_abs_tol: 0.03
    bondlen_cdf_rel_tol: 0.0
    bondlen_cdf_abs_tol: 0.02
    angle_cdf_rel_tol: 0.0
    angle_cdf_abs_tol: 0.02
    coord_cdf_rel_tol: 0.0
    coord_cdf_abs_tol: 0.02
    gr_curve_rel_tol: 0.05
    gr_curve_abs_tol: 0.05
    sq_curve_rel_tol: 0.05
    sq_curve_abs_tol: 0.05
    void_cdf_rel_tol: 0.0
    void_cdf_abs_tol: 0.02
    zscore: 1.96
lammps:
  lammps_cmd: lmp
  mpi_cmd: null
  nprocs: 1
