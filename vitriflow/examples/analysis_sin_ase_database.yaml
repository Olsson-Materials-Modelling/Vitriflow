# Standalone VitriFlow analysis config for an ASE database containing
# amorphous Si3N4 final structures.
#
# Each ASE database row is treated as one final structure / one box.
# The input database path is supplied on the CLI, not inside this YAML:
#
#   vitriflow analyze-output \
#     -c analysis_sin_ase_database.yaml \
#     -i amorphous_sin_final_structures.db \
#     -o analysis_sin_ase_db
#
# Requirements for the ASE DB rows:
#   - periodic cell present and non-zero volume
#   - chemical symbols are Si and N, or type IDs can be mapped by type_to_species
#   - one row should represent one final/converged amorphous structure

analysis:
  # For symbol-only ASE rows this fixes the internal type order:
  #   type 1 -> Si, type 2 -> N
  # For LAMMPS-like rows/files this also provides the atom-type mapping.
  type_to_species: [Si, N]

  # Mostly provenance for ASE DB input. Kept here so the same config can also
  # be used for LAMMPS-style files during permutation tests.
  atom_style: atomic
  timestep: 1.0

  metrics:
    enabled: true
    time_average_frames: 1
    type_to_species: [Si, N]

    pairs:
      - {pair: [Si, N]}
      - {pair: [Si, Si]}
      - {pair: [N, N]}

    coordinations:
      - {central: Si, neighbor: N, expected: 4, defect_frac_tol: 0.02}
      - {central: N, neighbor: Si, expected: 3, defect_frac_tol: 0.02}

    angles:
      - {triplet: [N, Si, N]}
      - {triplet: [Si, N, Si]}

    gr:
      - {pair: null, r_max: 10.0, nbins: 500}
      - {pair: [Si, N], r_max: 10.0, nbins: 500}
      - {pair: [Si, Si], r_max: 10.0, nbins: 500}
      - {pair: [N, N], r_max: 10.0, nbins: 500}

    rings:
      enabled: true
      mode: bond_graph
      nodes: [Si, N]
      bond_pairs:
        - {pair: [Si, N]}
      max_cycle_size: 12

    voids:
      enabled: true
      n_samples: 8192
      r_max: 5.0
      cdf_points: 200

  production:
    enabled: true
    min_boxes: 1
    batch_boxes: 1
    check_convergence: true
    store_distributions: true
    # Keep all external structures by default. Set true only if you explicitly
    # want production-style rejection of coordination-defective boxes.
    exclude_coordination_defects: false

  convergence:
    mode: both
    density_rel_tol: 0.01
    density_abs_tol: 0.001
    coord_abs_tol: 0.05
    bondlen_abs_tol: 0.02
    angle_abs_tol: 2.0
    ring_abs_tol: 0.05
    bondlen_cdf_abs_tol: 0.02
    angle_cdf_abs_tol: 0.02
    coord_cdf_abs_tol: 0.02
    void_cdf_abs_tol: 0.02
